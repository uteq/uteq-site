            {pages.map((p, i) => {
              const col = i % 4, row = Math.floor(i / 4), x = 35 + col * 60, y = 185 + row * 36;

                <g key={i}>
                  <rect x={x} y={y} width="44" height="28" rx="3" fill={animate ? `${gold}20` : "rgba(255,255,255,0.03)"} stroke={animate ? `${gold}50` : "rgba(255,255,255,0.08)"} strokeWidth="1" style={{ transition: `all 0.6s ease ${0.3 + i * 0.08}s` }} />

      <div style={{ textAlign: "center" }}>

function PuzzleScene() {
  const [animate, setAnimate] = useState(false);

  const pieces = Array.from({ length: 16 }, (_, i) => ({ col: i % 4, row: Math.floor(i / 4), id: i }));

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 60px 1fr", gap: "0", alignItems: "center" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ display: "flex", justifyContent: "center", padding: "30px 0" }}>

            {pieces.map((p) => (
              <div key={p.id} style={{ width: "52px", height: "52px", borderRadius: "6px", background: animate ? `linear-gradient(135deg, ${gold}25, ${gold}15)` : "rgba(255,255,255,0.03)", border: `1px solid ${animate ? `${gold}35` : "rgba(255,255,255,0.06)"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontFamily: mono, fontWeight: 600, color: animate ? gold : "rgba(255,255,255,0.1)", opacity: animate ? 1 : 0.3, transform: animate ? "scale(1)" : "scale(0.8)", transition: `all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.2 + p.id * 0.06}s` }}>
                {animate ? "✓" : ""}
              </div>
            ))}
          </div>
        </div>
        <div><div style={{ fontSize: "15px", fontWeight: 700, color: gold }}>Opus 4.6</div><div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)", marginTop: "4px", lineHeight: 1.5 }}>Legt de <strong style={{ color: "rgba(255,255,255,0.7)" }}>hele puzzel</strong> in één keer.<br/>Elk stuk past. Coherent geheel.</div></div>
      </div>
      <div style={{ textAlign: "center", color: "rgba(255,255,255,0.1)", fontSize: "16px", fontWeight: 800 }}>VS</div>
      <div style={{ textAlign: "center" }}>
        <div style={{ display: "flex", justifyContent: "center", padding: "30px 0" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 52px)", gridTemplateRows: "repeat(4, 52px)", gap: "3px", padding: "12px", borderRadius: "14px", background: "transparent", border: "1px solid rgba(255,255,255,0.04)" }}>
            {pieces.map((p) => {
              const placed = p.id < 5, wrong = p.id >= 5 && p.id < 8, missing = p.id >= 8;
              const offsets = [{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:0,y:0},{x:6,y:-4},{x:-5,y:7},{x:4,y:5},...Array(8).fill({x:0,y:0})];
              const o = offsets[p.id] || {x:0,y:0};
              return (
                <div key={p.id} style={{ width: "52px", height: "52px", borderRadius: "6px", background: placed ? `${blue}18` : wrong ? "rgba(239,68,68,0.1)" : "rgba(255,255,255,0.015)", border: `1px solid ${placed ? `${blue}30` : wrong ? "rgba(239,68,68,0.2)" : "rgba(255,255,255,0.04)"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: missing ? "14px" : "11px", fontFamily: mono, fontWeight: 600, color: placed ? blue : wrong ? "#EF4444" : "rgba(255,255,255,0.06)", opacity: animate ? 1 : 0.3, transform: animate ? (wrong ? `translate(${o.x}px, ${o.y}px) rotate(${o.x}deg)` : "scale(1)") : "scale(0.8)", transition: `all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) ${0.2 + p.id * 0.06}s` }}>
                  {placed ? "✓" : wrong ? "✗" : missing && animate ? "?" : ""}
                </div>
              );
            })}
          </div>
        </div>
        <div><div style={{ fontSize: "15px", fontWeight: 700, color: blue }}>Lokaal 72B</div><div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)", marginTop: "4px", lineHeight: 1.5 }}>Legt <strong style={{ color: "rgba(255,255,255,0.7)" }}>5 van de 16</strong> stukken goed.<br/>3 verkeerd, 8 ontbreken.</div></div>
      </div>
    </div>
  );
}

            <div key={i} style={{ width: `${f.w}%`, maxWidth: "200px", height: "38px", background: animate ? i < 2 ? "rgba(239,68,68,0.12)" : i < 3 ? "rgba(251,191,36,0.12)" : `${blue}15` : "rgba(255,255,255,0.02)", border: `1px solid ${animate ? i < 2 ? "rgba(239,68,68,0.25)" : i < 3 ? "rgba(251,191,36,0.25)" : `${blue}30` : "rgba(255,255,255,0.04)"}`, borderRadius: i === 4 ? "0 0 6px 6px" : "0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: 600, fontFamily: mono, color: animate ? i < 2 ? "rgba(239,68,68,0.6)" : i < 3 ? "rgba(251,191,36,0.6)" : blue : "rgba(255,255,255,0.1)", letterSpacing: "0.05em", opacity: animate ? 1 : 0.2, transform: animate ? `translateX(${f.off}px) rotate(${f.rot}deg)` : "translateY(10px)", transition: `all 0.5s ease ${(4 - i) * 0.15 + 0.3}s`, marginTop: "-1px" }}>

        <div style={{ marginTop: "8px" }}><div style={{ fontSize: "15px", fontWeight: 700, color: blue }}>Lokaal 72B</div><div style={{ fontSize: "12px", color: "rgba(255,255,255,0.35)", marginTop: "4px", lineHeight: 1.5 }}>Fundament oké, maar <strong style={{ color: "rgba(255,255,255,0.7)" }}>boven wankel</strong>.<br/>Lagen sluiten niet aan.</div></div>

        </div>

/* ═══════════════════════════════════════════

const prompts = [
  { id: "laravel", label: "Laravel Architectuur", icon: "🏗️",
    prompt: "Ontwerp de service-laag architectuur voor een order management systeem met inventory tracking, automatische facturatie en klantnotificaties.",
    opus: `// App\\Services\\OrderOrchestrationService.php\n\nclass OrderOrchestrationService\n{\n    public function __construct(\n        private InventoryService $inventory,\n        private InvoiceService $invoicing,\n        private NotificationDispatcher $notifications,\n        private OrderRepository $orders,\n        private UnitOfWork $uow,\n    ) {}\n\n    public function placeOrder(PlaceOrderDTO $dto): Order\n    {\n        return $this->uow->execute(function () use ($dto) {\n            // 1. Reserve inventory\n            $reservation = $this->inventory->reserve($dto->items);\n\n            // 2. Create order aggregate\n            $order = Order::create($dto, $reservation);\n\n            // 3. Generate invoice via event\n            $order->recordEvent(new OrderPlaced($order));\n\n            // 4. Persist\n            $this->orders->save($order);\n\n            // 5. Dispatch async notifications\n            $this->notifications->queue(\n                new OrderConfirmation($order),\n                new InventoryAlert($reservation),\n                new InvoiceGenerated($order->invoice),\n            );\n\n            return $order;\n        });\n    }\n}\n\n// Separation of concerns:\n// - DTOs for input validation\n// - Repository pattern for persistence\n// - Domain events for side effects\n// - Unit of Work for transactional integrity\n// - Async notifications via queue`,

function StepDot({ status }) {
  const c = { done: "#4ADE80", partial: "#FBBF24", warn: "#FBBF24", fail: "#EF4444" };
  return <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: c[status] || "#666", flexShrink: 0, boxShadow: `0 0 8px ${c[status]}44` }} />;
}

function WorkflowColumn({ steps, color, label }) {
  const [vis, setVis] = useState(0);
  useEffect(() => { setVis(0); let c = 0; const iv = setInterval(() => { c++; setVis(c); if (c >= steps.length) clearInterval(iv); }, 350); return () => clearInterval(iv); }, [steps]);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px", padding: "8px 12px", background: `${color}10`, borderRadius: "8px" }}><span style={{ width: "8px", height: "8px", borderRadius: "2px", background: color }} /><span style={{ fontSize: "11px", fontWeight: 700, color, letterSpacing: "0.06em" }}>{label}</span></div>
      <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
        {steps.map((step, i) => (
          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "10px", padding: "10px 12px", borderRadius: "8px", background: i < vis ? "rgba(255,255,255,0.02)" : "transparent", opacity: i < vis ? 1 : 0.15, transform: i < vis ? "translateY(0)" : "translateY(8px)", transition: "all 0.4s ease" }}>
            <div style={{ paddingTop: "3px" }}><StepDot status={i < vis ? step.status : "pending"} /></div>
            <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontSize: "12px", fontWeight: 600, color: "rgba(255,255,255,0.8)", marginBottom: "2px" }}>{step.step}</div><div style={{ fontSize: "11px", color: "rgba(255,255,255,0.3)" }}>{step.detail}</div></div>
            <div style={{ fontSize: "11px", fontFamily: mono, color: "rgba(255,255,255,0.25)", flexShrink: 0, paddingTop: "1px" }}>{step.time}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
